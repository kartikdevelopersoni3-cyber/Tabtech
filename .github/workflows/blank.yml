name: Build Roohi APK

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build-apk:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable

  - name: Flutter Version
    run: flutter --version

  - name: Extract Project
    run: |
      if [ -f Roohi_APK_Ready.zip ]; then
        unzip -o Roohi_APK_Ready.zip -d project
        cp -r project/* .
      fi

  - name: Get Packages
    run: flutter pub get

  - name: Build Release APK
    run: flutter build apk --release

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: Roohi-APK
      path: build/app/outputs/flutter-apk/app-release.apk
